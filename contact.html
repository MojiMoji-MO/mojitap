<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Mojitap</title>
    <link rel="icon" type="image/png" href="mojitap-favicon.png">
    <style>
        /* 공통 스타일은 동일합니다 */
        :root { --primary-color: #FF4F6D; --primary-hover: #E83F5B; --sub-purple: #8B5CF6; --accent-mint: #22D3C5; --secondary-bg: #FFF0F2; --bg-color: #F9FAFB; --box-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; --border-color: #E5E7EB; }
        body { font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { position: relative; width: 100%; max-width: 900px; background: var(--box-bg); box-shadow: 0 10px 30px rgba(255, 79, 109, 0.05); border-radius: 20px; display: flex; flex-direction: column; padding: 40px; box-sizing: border-box; }
        .lang-toggle { position: absolute; top: 20px; right: 20px; display: flex; background: #F3F4F6; border-radius: 10px; overflow: hidden; }
        .lang-btn { border: none; background: none; padding: 8px 14px; font-size: 13px; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .lang-btn.active { background: var(--primary-color); color: white; }
        header { text-align: center; margin-bottom: 20px; margin-top: 10px; }
        .top-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .nav-item { text-decoration: none; color: var(--text-muted); font-weight: 700; font-size: 16px; padding: 10px 20px; border-radius: 10px; transition: all 0.3s; }
        .nav-item:hover { color: var(--primary-color); }
        .nav-item.active { color: var(--primary-color); background: var(--secondary-bg); }
        
        /* 폼(Form) 전용 스타일 */
        .contact-form { display: grid; gap: 15px; max-width: 500px; margin: 0 auto; width: 100%; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 18px; border: 2px solid var(--border-color); border-radius: 14px; font-size: 15px; box-sizing: border-box; transition: 0.3s; font-family: inherit; }
        .contact-form input:focus, .contact-form textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(255, 79, 109, 0.1); }
        .contact-form textarea { height: 160px; resize: vertical; }
        
        /* 전송 버튼 (퍼플 -> 민트) */
        .submit-btn { background-color: var(--sub-purple); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2); }
        .submit-btn:hover { background-color: var(--accent-mint); color: #064E3B; box-shadow: 0 4px 15px rgba(34, 211, 197, 0.3); transform: translateY(-2px); }

        footer { margin-top: 40px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .footer-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .footer-links a:hover { color: var(--primary-color); }
        body.ko .lang-en { display: none !important; }
        body.en .lang-ko { display: none !important; }
        @media (max-width: 768px) { body { padding: 0; } .app-container { border-radius: 0; padding: 20px 15px; } }
    </style>
</head>
<body class="ko">
    <div class="app-container">
        <!-- 공통 헤더/메뉴 -->
        <div class="lang-toggle">
            <button class="lang-btn active" id="btn-ko" onclick="setLanguage('ko')">KOR</button>
            <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">ENG</button>
        </div>
        <header><a href="/"><img src="mojitap-logo.png" alt="Mojitap Logo" style="height: 50px; max-width: 100%; margin-bottom: 10px;"></a></header>
        <nav class="top-nav">
            <a href="/" class="nav-item"><span class="lang-ko">✨ 이모지 툴</span><span class="lang-en">✨ Emoji Tool</span></a>
            <a href="/blog" class="nav-item"><span class="lang-ko">📚 마케팅 꿀팁</span><span class="lang-en">📚 Marketing Tips</span></a>
        </nav>
        
        <main>
            <h2 style="text-align: center; margin-bottom: 25px; color: var(--text-main);">
                <span class="lang-ko">✉️ 무엇이든 물어보세요</span><span class="lang-en">✉️ Contact Us</span>
            </h2>
            <form class="contact-form" onsubmit="event.preventDefault(); alert('문의가 접수되었습니다.');">
                <input type="text" placeholder="이름 (Name)" required>
                <input type="email" placeholder="이메일 (Email)" required>
                <textarea placeholder="문의 내용 (Your Message)" required></textarea>
                <button type="submit" class="submit-btn">
                    <span class="lang-ko">메시지 보내기</span><span class="lang-en">Send Message</span>
                </button>
            </form>
        </main>

        <footer>
            <div class="footer-links">
                <a href="/about"><span class="lang-ko">사이트 소개</span><span class="lang-en">About</span></a>
                <a href="/privacy"><span class="lang-ko">개인정보처리방침</span><span class="lang-en">Privacy Policy</span></a>
                <a href="/terms"><span class="lang-ko">이용약관</span><span class="lang-en">Terms of Service</span></a>
                <a href="/contact"><span class="lang-ko">문의하기</span><span class="lang-en">Contact</span></a>
            </div>
            <div class="copyright">&copy; 2026 Mojitap. All rights reserved.</div>
        </footer>
    </div>
    <script>
        function setLanguage(lang) {
            document.body.className = lang;
            document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        }
    </script>
</body>
</html>
