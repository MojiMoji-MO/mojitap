<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8R7T1JEFVL"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-8R7T1JEFVL');</script>

    <meta name="description" content="Contact Mojitap for business inquiries, support, and partnerships.">
    <title>Contact Us | Mojitap</title>
    <link rel="icon" type="image/png" href="mojitap-favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast"></div>

    <div class="app-container">
        <div id="header-placeholder"></div>
        
        <main class="content-box">
            <h1>✉️ Contact Us</h1>

            <p>If you experience any inconvenience while using the service, or if you have proposals for advertising and business partnerships, please contact us via the form below.</p>
            
            <div class="email-box">
                <span>Official Email: info.mojitap@gmail.com</span>
            </div>

            <form class="contact-form" id="contactForm">
                <input type="hidden" name="_subject" value="[Mojitap] New Contact Message!">
                <input type="hidden" name="_captcha" value="false">

                <input type="text" name="Name" placeholder="Name" required>
                <input type="email" name="Email" placeholder="Email" required>
                <textarea name="Message" placeholder="Your Message" required></textarea>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>Send Message</span>
                </button>
            </form>
        </main>

        <div id="footer-placeholder"></div>
    </div>
    
    <script src="layout.js"></script>
    <script>
        window.onload = () => { initLayout('contact'); };

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 2500);
        }

        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalHTML = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '⏳ Sending...';

            const formData = new FormData(form);

            fetch("https://formsubmit.co/ajax/info.mojitap@gmail.com", {
                method: "POST",
                headers: {
                    'Accept': 'application/json'
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                showToast('✅ Message sent successfully!');
                form.reset(); 
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            })
            .catch(error => {
                showToast('❌ Failed to send. Please try again.');
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            });
        });
    </script>
</body>
</html>
