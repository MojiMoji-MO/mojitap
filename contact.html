<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문의하기 - Mojitap</title>
<style>
  /* 기본 초기화 */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', sans-serif;
    background-color: #f4f7f6;
    color: #333;
    padding: 20px;
  }

  /* 쨍하고 생동감 있는 포인트 컬러 설정 */
  :root {
    --primary-vibrant: #FF2A5F; /* 쨍한 핑크 코랄 */
    --secondary-vibrant: #FF7B00; /* 쨍한 오렌지 */
    --border-color: #e1e4e8;
  }

  .contact-wrapper {
    max-width: 650px;
    margin: 40px auto;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    padding: 40px;
  }

  .contact-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .contact-desc {
    font-size: 15px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 25px;
    padding-bottom: 25px;
    border-bottom: 1px solid var(--border-color);
  }

  .contact-desc p {
    margin-bottom: 8px;
  }

  /* 공식 이메일 강조 영역 */
  .official-email-box {
    background: #fdf2f5; /* 쨍한 색상에 맞춘 연한 배경 */
    color: var(--primary-vibrant);
    text-align: center;
    padding: 15px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 30px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #444;
  }

  .form-group input, 
  .form-group textarea {
    width: 100%;
    padding: 14px;
    border: 1.5px solid var(--border-color);
    border-radius: 10px;
    font-size: 15px;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  /* 입력창 포커스 시 쨍한 색상으로 하이라이트 */
  .form-group input:focus, 
  .form-group textarea:focus {
    outline: none;
    border-color: var(--primary-vibrant);
    box-shadow: 0 0 0 4px rgba(255, 42, 95, 0.15);
  }

  /* 쨍한 그라데이션 전송 버튼 */
  .submit-button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary-vibrant), var(--secondary-vibrant));
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 10px;
  }

  .submit-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255, 42, 95, 0.35);
  }

  .notice-footer {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="contact-wrapper">
  <div class="contact-title">
    ✉️ 문의하기 (Contact Us)
  </div>
  
  <div class="contact-desc">
    <p>서비스 이용 중 불편한 점이 있거나, 광고 게재 및 비즈니스 제휴 제안이 있으신 경우 아래 양식을 통해 편하게 문의해 주시기 바랍니다.</p>
    <p>일반적인 이모지 추가 요청 등은 내부 검토를 거쳐 다음 업데이트에 반영됩니다.</p>
  </div>

  <div class="official-email-box">
    공식 이메일: info.mojitap@gmail.com
  </div>

  <!-- Formspree 연동을 위한 form 태그 시작 -->
  <!-- action 부분의 URL을 Formspree에서 받은 고유 주소로 반드시 변경하세요 -->
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    
    <div class="form-group">
      <label for="replyTo">답변 받으실 이메일 주소</label>
      <input type="email" id="replyTo" name="email" placeholder="example@email.com" required>
    </div>
    
    <div class="form-group">
      <label for="message">문의 내용</label>
      <textarea id="message" name="message" rows="6" placeholder="여기에 문의하실 내용을 자세히 적어주세요." required></textarea>
    </div>
    
    <button type="submit" class="submit-button">메시지 보내기</button>
  </form>

  <div class="notice-footer">
    * 영업일 기준 3~5일 이내에 답변을 드리고 있으나, 문의량에 따라 지연될 수 있습니다.
  </div>
</div>

</body>
</html>
