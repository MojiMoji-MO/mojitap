<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사이트 점검 중 - Emoji Decorator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            max-width: 400px;
            width: 85%;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 12px 0;
            color: #2c3e50;
            font-weight: 800;
        }
        p {
            font-size: 15px;
            color: #7f8c8d;
            line-height: 1.6;
            margin: 0;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚧</div>
        <h1>현재 사이트 단장 중입니다</h1>
        <p>더 나은 서비스를 제공하기 위해<br>잠시 점검 및 업데이트를 진행하고 있습니다.<br>멋진 모습으로 곧 찾아뵙겠습니다!</p>
    </div>
</body>
</html>
