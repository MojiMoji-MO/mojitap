    <title>Mojitap - 3초 완성 이모지 마케팅 툴</title>
    <link rel="icon" type="image/png" href="mojitap-favicon.png">
    
    <style>
        :root {
            --primary-color: #FF4F6D; 
            --primary-hover: #E83F5B; 
            --sub-purple: #8B5CF6;    
            --accent-mint: #22D3C5;   
            --secondary-bg: #FFF0F2;  
            --bg-color: #F9FAFB;      
            --box-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --palette-bg: #F3F4F6; 
            --tab-active: #FF4F6D;    
            --tab-inactive: #E5E7EB; 
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { position: relative; width: 100%; max-width: 900px; background: var(--box-bg); box-shadow: 0 10px 30px rgba(255, 79, 109, 0.05); border-radius: 20px; display: flex; flex-direction: column; padding: 40px; box-sizing: border-box; }

        .lang-toggle { position: absolute; top: 20px; right: 20px; display: flex; background: #F3F4F6; border-radius: 10px; overflow: hidden; }
        .lang-btn { border: none; background: none; padding: 8px 14px; font-size: 13px; font-weight: 800; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
        .lang-btn.active { background: var(--primary-color); color: white; }

        header { text-align: center; margin-bottom: 20px; margin-top: 10px; }
        .top-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .nav-item { text-decoration: none; color: var(--text-muted); font-weight: 700; font-size: 16px; padding: 10px 20px; border-radius: 10px; transition: all 0.3s; }
        .nav-item:hover { color: var(--primary-color); }
        .nav-item.active { color: var(--primary-color); background: var(--secondary-bg); }

        .tool-section { display: flex; flex-direction: column; gap: 15px; }
        .textarea-wrapper { display: flex; gap: 20px; }
        
        textarea { flex: 1; height: 180px; padding: 18px; border: 2px solid var(--border-color); border-radius: 14px; font-size: 16px; line-height: 1.6; resize: vertical; box-sizing: border-box; font-family: inherit; transition: 0.3s; }
        textarea:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(255, 79, 109, 0.1); }
        
        /* 결과창 배경색을 약간 다르게 주어 에디터 느낌 강화 */
        #outputText { background-color: #FAFAFA; border-color: #D1D5DB; }
        #outputText:focus { background-color: #FFFFFF; border-color: var(--sub-purple); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15); }

        .btn-action, .btn-copy { border: none; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.3s; width: 100%; }
        .btn-action { background-color: var(--primary-color); color: white; box-shadow: 0 4px 15px rgba(255, 79, 109, 0.3); }
        .btn-action:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        
        .btn-copy { background-color: var(--sub-purple); color: white; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2); }
        .btn-copy:hover { background-color: var(--accent-mint); box-shadow: 0 4px 15px rgba(34, 211, 197, 0.3); transform: translateY(-2px); color: #064E3B; }

        .hint-text { text-align: center; font-size: 14px; color: var(--sub-purple); font-weight: 700; margin-top: 10px; margin-bottom: 5px; }

        .emoji-palette-section { margin-top: 25px; }
        .palette-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }

        .tab-container { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { background-color: var(--tab-inactive); color: #4B5563; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
        .tab-btn:hover { background-color: #D1D5DB; }
        .tab-btn.active { background-color: var(--tab-active); color: white; box-shadow: 0 4px 10px rgba(255, 79, 109, 0.2); }

        .emoji-display-area { background-color: var(--palette-bg); border-radius: 16px; padding: 25px; display: grid; grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); gap: 12px; max-height: 320px; overflow-y: auto; }
        .emoji-item { background-color: white; border-radius: 12px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; font-family: "Apple Color Emoji", "Segoe UI Emoji", sans-serif; border: 1px solid transparent; box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.03); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .emoji-item:hover { transform: translateY(-3px) scale(1.08); box-shadow: 0 6px 15px rgba(34, 211, 197, 0.25); border: 1px solid var(--accent-mint); }
        .emoji-item:active { transform: scale(0.95); }

        #toast { visibility: hidden; min-width: 250px; background-color: #374151; color: #fff; text-align: center; border-radius: 30px; padding: 16px 20px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 15px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }

        .seo-content { margin-top: 50px; padding: 30px; background: white; border-top: 2px dashed var(--border-color); color: #374151; line-height: 1.8; font-size: 15px; }
        .seo-content h2 { font-size: 22px; color: var(--text-main); margin-bottom: 20px; font-weight: 800; }
        .seo-content h3 { font-size: 18px; margin-top: 30px; margin-bottom: 12px; color: var(--primary-color); font-weight: 700; }
        .seo-content p { margin-bottom: 15px; }

        footer { margin-top: 40px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .footer-links { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 600; transition: 0.2s; }
        .footer-links a:hover { color: var(--primary-color); }

        body.ko .lang-en { display: none !important; }
        body.en .lang-ko { display: none !important; }

        @media (max-width: 768px) { body { padding: 0; } .app-container { border-radius: 0; padding: 20px 15px; } .textarea-wrapper { flex-direction: column; gap: 15px; } .lang-toggle { top: 10px; right: 10px; } }
